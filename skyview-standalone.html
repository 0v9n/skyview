<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Skyview</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; font-family: system-ui, sans-serif; }
#cesiumContainer { width: 100vw; height: 100vh; }
#overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; }

/* Search bar — always visible, top center */
#searchWrap {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 20;
  width: 320px; max-width: calc(100vw - 20px);
}
#searchInput {
  width: 100%; background: rgba(10,12,20,0.88); color: #eee;
  border: 1px solid #444; border-radius: 8px; padding: 8px 12px; font-size: 13px;
  outline: none; backdrop-filter: blur(6px);
}
#searchInput:focus { border-color: #4c4; }
#searchInput::placeholder { color: #666; }

/* Panel — details + controls, slides in from right below polar */
#panel {
  position: fixed; top: 190px; right: 10px; z-index: 10;
  background: rgba(10,12,20,0.88); border-radius: 10px; border: 1px solid #333;
  padding: 10px; width: 260px; display: flex; flex-direction: column; gap: 8px;
  backdrop-filter: blur(6px);
  transform: translateX(calc(100% + 20px));
  transition: transform 0.25s ease-out, opacity 0.25s ease-out;
  opacity: 0;
}
#panel.visible { transform: translateX(0); opacity: 1; }
#panel.hiding { transform: translateX(calc(100% + 20px)); opacity: 0; }
#panel input[type=number] {
  background: #1a1d28; color: #eee; border: 1px solid #444; border-radius: 5px;
  padding: 4px 6px; font-size: 12px; outline: none;
}
#panel .hud { color: #bbb; font-size: 11px; line-height: 1.6; }
#panel .hud b { color: #fff; }
#panel .hud .g { color: #4c4; } #panel .hud .r { color: #f66; }
#panel .hud .y { color: #fc4; } #panel .hud .c { color: #4cc; }
#panel label { color: #999; font-size: 11px; display: flex; align-items: center; gap: 5px; }
#panel input[type=range] { width: 80px; }
#panel .row { display: flex; align-items: center; gap: 4px; }
#panel .row button {
  padding: 2px 7px; font-size: 13px; cursor: pointer;
  background: #2a2d38; color: #ccc; border: 1px solid #444; border-radius: 4px;
}
#panel .row button:hover { background: #3a3d48; }

/* Floating polar plot — top-right quarter */
#polarFloat {
  position: fixed; top: 10px; right: 10px; z-index: 9;
  width: 160px; height: 170px;
  background: rgba(10,12,20,0.75); border-radius: 10px; border: 1px solid #333;
  padding: 6px; backdrop-filter: blur(4px);
  display: none; /* shown after first point */
  transition: opacity 0.2s ease-out;
}
#polarFloat canvas { width: 148px; height: 148px; border-radius: 50%; display: block; margin: 0 auto; cursor: crosshair; touch-action: none; }

/* Toggle button */
#panelToggle {
  position: fixed; top: 190px; right: 10px; z-index: 11;
  width: 36px; height: 36px; border-radius: 8px; border: 1px solid #444;
  background: rgba(10,12,20,0.88); color: #ccc; font-size: 18px;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(6px); transition: opacity 0.2s;
}
#panelToggle:hover { background: rgba(30,33,48,0.95); }

#controls {
  position: fixed; bottom: 10px; left: 10px;
  color: #777; font-size: 10px; background: rgba(0,0,0,0.5);
  padding: 5px 10px; border-radius: 5px; pointer-events: none; z-index: 10;
}
.cesium-viewer-toolbar, .cesium-viewer-animationContainer,
.cesium-viewer-timelineContainer, .cesium-viewer-bottom,
.cesium-viewer-fullscreenContainer { display: none !important; }

@media (max-width: 600px) {
  /* Same layout as desktop: polar top-right, panel below, just smaller */
  #polarFloat { width: 140px; height: 150px; top: 50px; right: 8px; padding: 4px; }
  #polarFloat canvas { width: 132px; height: 132px; }
  #panel { width: 200px; right: 8px; top: 210px; max-height: calc(100vh - 220px); overflow-y: auto; padding: 8px; }
  #panel label { font-size: 10px; }
  #panel input[type=range] { width: 60px; }
  #panel .hud { font-size: 10px; }
  #panelToggle { top: 210px; right: 8px; }
  #searchWrap { width: 200px; max-width: calc(100vw - 170px); left: 10px; transform: none; }
}
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<canvas id="overlay"></canvas>
<div id="searchWrap">
  <input type="text" id="searchInput" placeholder="Search: 'Eiffel Tower' or '48.858, 2.294'" spellcheck="false">
</div>
<!-- Polar plot — always visible in top-right after point placed -->
<div id="polarFloat">
  <canvas id="polarCanvas" width="480" height="480"></canvas>
</div>
<!-- Expandable details panel -->
<button id="panelToggle">&#9776;</button>
<div id="panel">
  <div class="hud" id="hud"></div>
  <label>Azimuth <span class="row">
    <input type="range" id="slAz" min="0" max="355" value="0" step="5">
    <button id="btnAzMinus">&minus;</button>
    <input type="number" id="numAz" value="0" min="0" max="355" step="10" style="width:45px;text-align:center;padding:2px;">
    <button id="btnAzPlus">+</button><span style="color:#666">&deg;</span>
  </span></label>
  <label>&Delta;Height <span class="row">
    <input type="range" id="slHeight" min="0" max="100" value="0" step="1">
    <button id="btnHMinus">&minus;</button>
    <input type="number" id="numHeight" value="0" min="0" max="200" step="1" style="width:40px;text-align:center;padding:2px;">
    <button id="btnHPlus">+</button><span style="color:#666">m</span>
  </span></label>
</div>
<div id="controls"></div>
<script>
// ============================================================
// PLATFORM DETECTION
// ============================================================
const IS_MOBILE = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && innerWidth < 1024);
const OV_DPR = IS_MOBILE ? 1 : devicePixelRatio;

// ============================================================
// SKYVIEW CONFIG
// ============================================================
const MIN_ELEV_DEG = 35, DOME_R = 5, RAY_RANGE = 100, AZ_N = 72, EL_N = 15;
const BEAM_HALF_ANGLE_DEG = 55, PITCH_DEG = 15;

function beamAxis(pitchDeg, azDeg) {
  const p = pitchDeg * Math.PI / 180, a = azDeg * Math.PI / 180;
  return Cesium.Cartesian3.fromElements(Math.sin(p)*Math.sin(a), Math.sin(p)*Math.cos(a), Math.cos(p));
}

// ============================================================
// RAYTRACE
// ============================================================
function computeSkyview(viewer, ctCart, enuTx, pitchDeg, azDeg) {
  const minEl = MIN_ELEV_DEG*Math.PI/180, maxEl = Math.PI/2;
  const axis = beamAxis(pitchDeg, azDeg);
  const beamCos = Math.cos(BEAM_HALF_ANGLE_DEG*Math.PI/180);
  const results = []; let clear=0, total=0;

  for (let ai=0; ai<AZ_N; ai++) {
    const row = [], az = (ai/AZ_N)*2*Math.PI;
    for (let ei=0; ei<EL_N; ei++) {
      const el = minEl + (ei/(EL_N-1))*(maxEl-minEl);
      const enuDir = new Cesium.Cartesian3(Math.sin(az)*Math.cos(el), Math.cos(az)*Math.cos(el), Math.sin(el));
      const inside = Cesium.Cartesian3.dot(
        Cesium.Cartesian3.normalize(enuDir, new Cesium.Cartesian3()),
        Cesium.Cartesian3.normalize(axis, new Cesium.Cartesian3())) >= beamCos;

      let hit=false, hitDist=RAY_RANGE;
      if (inside) {
        const wDir = Cesium.Matrix4.multiplyByPointAsVector(enuTx, enuDir, new Cesium.Cartesian3());
        Cesium.Cartesian3.normalize(wDir, wDir);
        const pick = viewer.scene.pickFromRay(new Cesium.Ray(ctCart, wDir), []);
        if (pick && pick.position) {
          const d = Cesium.Cartesian3.distance(ctCart, pick.position);
          if (d < RAY_RANGE) { hit=true; hitDist=d; }
        }
        total++; if(!hit) clear++;
      }
      row.push({inside, hit, hitDist, az, el, enuDir});
    }
    results.push(row);
  }
  return {results, clear, total, pct: total>0?(100*clear/total).toFixed(1):'N/A'};
}

// ============================================================
// DOME OVERLAY — pre-allocated scratch objects
// ============================================================
const _scratchC3 = new Cesium.Cartesian3();
const _scratchP  = new Cesium.Cartesian3();
const _scratchN  = new Cesium.Cartesian3();
const _scratchN2 = new Cesium.Cartesian3();
const _scratchCorners = [new Cesium.Cartesian3(), new Cesium.Cartesian3(), new Cesium.Cartesian3(), new Cesium.Cartesian3()];

function drawDomeOverlay(ctx, w, h, viewer, ctCart, enuTx, skyview) {
  ctx.clearRect(0, 0, w, h);
  if (!skyview || !ctCart) return;

  const minEl = MIN_ELEV_DEG*Math.PI/180, maxEl = Math.PI/2;
  const scene = viewer.scene;

  function toScreen(worldPos) {
    const sp = Cesium.SceneTransforms.wgs84ToWindowCoordinates(scene, worldPos);
    return sp ? [sp.x * OV_DPR, sp.y * OV_DPR] : null;
  }

  const redCells = [], greenCells = [];
  for (let ai=0; ai<AZ_N; ai++) {
    for (let ei=0; ei<EL_N-1; ei++) {
      const cell = skyview.results[ai][ei];
      if (!cell.inside) continue;

      const az0=(ai/AZ_N)*2*Math.PI, az1=((ai+1)/AZ_N)*2*Math.PI;
      const el0=minEl+(ei/(EL_N-1))*(maxEl-minEl);
      const el1=minEl+((ei+1)/(EL_N-1))*(maxEl-minEl);

      _scratchCorners[0].x=DOME_R*Math.sin(az0)*Math.cos(el0); _scratchCorners[0].y=DOME_R*Math.cos(az0)*Math.cos(el0); _scratchCorners[0].z=DOME_R*Math.sin(el0);
      _scratchCorners[1].x=DOME_R*Math.sin(az0)*Math.cos(el1); _scratchCorners[1].y=DOME_R*Math.cos(az0)*Math.cos(el1); _scratchCorners[1].z=DOME_R*Math.sin(el1);
      _scratchCorners[2].x=DOME_R*Math.sin(az1)*Math.cos(el1); _scratchCorners[2].y=DOME_R*Math.cos(az1)*Math.cos(el1); _scratchCorners[2].z=DOME_R*Math.sin(el1);
      _scratchCorners[3].x=DOME_R*Math.sin(az1)*Math.cos(el0); _scratchCorners[3].y=DOME_R*Math.cos(az1)*Math.cos(el0); _scratchCorners[3].z=DOME_R*Math.sin(el0);

      const pts = [];
      let skip = false;
      for (let i=0; i<4; i++) {
        Cesium.Matrix4.multiplyByPoint(enuTx, _scratchCorners[i], _scratchP);
        const s = toScreen(_scratchP);
        if (!s) { skip=true; break; }
        pts.push(s[0], s[1]);
      }
      if (skip) continue;
      (cell.hit ? redCells : greenCells).push(pts);
    }
  }

  ctx.fillStyle = 'rgba(220,30,20,0.35)';
  ctx.beginPath();
  for (const p of redCells) { ctx.moveTo(p[0],p[1]); ctx.lineTo(p[2],p[3]); ctx.lineTo(p[4],p[5]); ctx.lineTo(p[6],p[7]); ctx.closePath(); }
  ctx.fill();

  ctx.fillStyle = 'rgba(20,200,60,0.2)';
  ctx.beginPath();
  for (const p of greenCells) { ctx.moveTo(p[0],p[1]); ctx.lineTo(p[2],p[3]); ctx.lineTo(p[4],p[5]); ctx.lineTo(p[6],p[7]); ctx.closePath(); }
  ctx.fill();

  ctx.beginPath();
  for (const row of skyview.results) {
    for (const r of row) {
      if (!r.inside || !r.hit) continue;
      Cesium.Cartesian3.normalize(r.enuDir, _scratchN);
      Cesium.Cartesian3.multiplyByScalar(_scratchN, r.hitDist, _scratchN);
      Cesium.Matrix4.multiplyByPoint(enuTx, _scratchN, _scratchP);
      const s0 = toScreen(ctCart), s1 = toScreen(_scratchP);
      if (!s0 || !s1) continue;
      ctx.moveTo(s0[0],s0[1]); ctx.lineTo(s1[0],s1[1]);
    }
  }
  ctx.strokeStyle = 'rgba(255,60,40,0.2)'; ctx.lineWidth = 1; ctx.stroke();

  ctx.beginPath();
  const elRad = MIN_ELEV_DEG*Math.PI/180;
  for (let i=0; i<=72; i++) {
    const az = (i/72)*2*Math.PI;
    _scratchC3.x=DOME_R*Math.sin(az)*Math.cos(elRad); _scratchC3.y=DOME_R*Math.cos(az)*Math.cos(elRad); _scratchC3.z=DOME_R*Math.sin(elRad);
    Cesium.Matrix4.multiplyByPoint(enuTx, _scratchC3, _scratchP);
    const sp = toScreen(_scratchP);
    if (!sp) continue;
    if (i===0) ctx.moveTo(sp[0],sp[1]); else ctx.lineTo(sp[0],sp[1]);
  }
  ctx.strokeStyle = 'rgba(255,255,60,0.7)'; ctx.lineWidth = 2; ctx.stroke();

  const ctS = toScreen(ctCart);
  if (ctS) {
    ctx.beginPath(); ctx.arc(ctS[0],ctS[1],6*OV_DPR,0,Math.PI*2);
    ctx.fillStyle = 'cyan'; ctx.fill();
    ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
  }

  Cesium.Cartesian3.normalize(beamAxis(PITCH_DEG, skyview._azDeg||0), _scratchN2);
  Cesium.Cartesian3.multiplyByScalar(_scratchN2, DOME_R*0.7, _scratchN2);
  Cesium.Matrix4.multiplyByPoint(enuTx, _scratchN2, _scratchP);
  const axS0 = toScreen(ctCart), axS1 = toScreen(_scratchP);
  if (axS0 && axS1) {
    ctx.beginPath(); ctx.moveTo(axS0[0],axS0[1]); ctx.lineTo(axS1[0],axS1[1]);
    ctx.strokeStyle = 'rgba(255,220,40,0.8)'; ctx.lineWidth = 3; ctx.stroke();
  }
}

// ============================================================
// 2D POLAR PLOT
// ============================================================
function drawPolarPlot(canvas, skyview, azimuthDeg) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, r = w/2 - 20;
  ctx.clearRect(0, 0, w, h);

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#1a1d28'; ctx.fill();

  if (!skyview) {
    ctx.fillStyle = '#555'; ctx.font = '14px system-ui';
    ctx.textAlign = 'center'; ctx.fillText('No data', cx, cy);
    return;
  }

  const minEl = MIN_ELEV_DEG * Math.PI / 180, maxEl = Math.PI / 2;
  const cosMin = Math.cos(minEl);

  for (let ai = 0; ai < AZ_N; ai++) {
    for (let ei = 0; ei < EL_N - 1; ei++) {
      const cell = skyview.results[ai][ei];
      const az0 = (ai/AZ_N)*2*Math.PI, az1 = ((ai+1)/AZ_N)*2*Math.PI;
      const el0 = minEl + (ei/(EL_N-1))*(maxEl-minEl);
      const el1 = minEl + ((ei+1)/(EL_N-1))*(maxEl-minEl);
      const d0 = r * Math.cos(el0) / cosMin;
      const d1 = r * Math.cos(el1) / cosMin;
      const ca0 = az0 - Math.PI/2, ca1 = az1 - Math.PI/2;

      ctx.beginPath();
      ctx.arc(cx, cy, d0, ca0, ca1, false);
      ctx.arc(cx, cy, d1, ca1, ca0, true);
      ctx.closePath();
      ctx.fillStyle = !cell.inside ? 'rgba(40,40,50,0.3)' : cell.hit ? 'rgba(220,40,30,0.75)' : 'rgba(30,180,60,0.55)';
      ctx.fill();
    }
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.5;
  for (let i = 1; i <= 4; i++) { ctx.beginPath(); ctx.arc(cx, cy, r*i/4, 0, Math.PI*2); ctx.stroke(); }

  ctx.fillStyle = '#aaa'; ctx.font = '11px system-ui'; ctx.textAlign = 'center';
  ctx.fillText('N', cx, cy - r - 5); ctx.fillText('S', cx, cy + r + 13);
  ctx.fillText('E', cx + r + 10, cy + 4); ctx.fillText('W', cx - r - 10, cy + 4);

  const axAz = azimuthDeg * Math.PI / 180, axA = axAz - Math.PI/2;
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.lineTo(cx + r*0.7*Math.cos(axA), cy + r*0.7*Math.sin(axA));
  ctx.strokeStyle = 'rgba(255,220,40,0.8)'; ctx.lineWidth = 2; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2);
  ctx.fillStyle = 'cyan'; ctx.fill();

  ctx.font = 'bold 13px system-ui'; ctx.textAlign = 'center';
  const p = parseFloat(skyview.pct);
  ctx.fillStyle = p >= 90 ? '#4c4' : p >= 70 ? '#fc4' : '#f66';
  ctx.fillText(`${skyview.pct}% clear`, cx, cy + r + 28);
}

// ============================================================
// MAIN
// ============================================================
async function main() {
  const hud = document.getElementById('hud');
  const panel = document.getElementById('panel');
  const panelToggle = document.getElementById('panelToggle');
  const polarFloat = document.getElementById('polarFloat');
  const ovCanvas = document.getElementById('overlay');
  const ovCtx = ovCanvas.getContext('2d');

  // Panel state
  let panelLocked = false; // user manually toggled
  let hasPoint = false;

  function showPolar() { polarFloat.style.display = 'block'; }
  function showPanel() { panel.classList.add('visible'); panel.classList.remove('hiding'); panelToggle.style.display = 'none'; }
  function hidePanel() { panel.classList.remove('visible'); panel.classList.add('hiding'); if (hasPoint) panelToggle.style.display = 'flex'; }

  panelToggle.addEventListener('click', () => {
    if (panel.classList.contains('visible')) {
      panelLocked = false; hidePanel();
    } else {
      panelLocked = true; showPanel();
    }
  });

  function resizeOverlay() {
    ovCanvas.width = innerWidth * OV_DPR;
    ovCanvas.height = innerHeight * OV_DPR;
    ovCanvas.style.width = innerWidth + 'px';
    ovCanvas.style.height = innerHeight + 'px';
  }
  resizeOverlay();
  window.addEventListener('resize', resizeOverlay);

  const sceneConfig = { api_key: 'AIzaSyCWHeBH9emavlGBH9c-yXHIKT_CCDDJH4A', lat: 47.6695, lon: -122.1055 };

  Cesium.GoogleMaps.defaultApiKey = sceneConfig.api_key;
  Cesium.RequestScheduler.requestsByServer["tile.googleapis.com:443"] = IS_MOBILE ? 6 : 18;

  const viewer = new Cesium.Viewer('cesiumContainer', {
    imageryProvider: false, globe: false,
    timeline: false, animation: false, homeButton: false,
    sceneModePicker: false, baseLayerPicker: false,
    navigationHelpButton: false, geocoder: false,
    fullscreenButton: false, infoBox: false, selectionIndicator: false,
    shadows: false,
  });
  viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date('2025-06-21T20:00:00Z'));
  viewer.clock.shouldAnimate = false;

  viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#87CEEB');
  viewer.scene.sun.show = true;
  viewer.scene.moon.show = false;
  viewer.scene.skyBox.show = false;
  viewer.scene.skyAtmosphere.show = true;

  if (IS_MOBILE) {
    viewer.resolutionScale = 0.75;
    viewer.scene.fog.enabled = false;
    viewer.scene.globe && (viewer.scene.globe.tileCacheSize = 50);
  }

  // Camera controller — Google Earth feel
  const cc = viewer.scene.screenSpaceCameraController;
  cc.inertiaSpin = 0.9;
  cc.inertiaTranslate = 0.9;
  cc.inertiaZoom = 0.8;
  cc.minimumZoomDistance = 5;
  cc.maximumZoomDistance = 50000;
  cc.enableCollisionDetection = true;
  cc._zoomFactor = 5;  // faster zoom for both desktop scroll + mobile pinch

  // Altitude-proportional zoom — override default handler
  const origZoomFn = cc._zoomFactor;
  viewer.scene.preRender.addEventListener(() => {
    const height = viewer.scene.camera.positionCartographic?.height || 1000;
    cc._zoomFactor = Math.max(2, Math.min(20, height / 100));
  });

  if (IS_MOBILE) {
    cc.zoomEventTypes = [Cesium.CameraEventType.PINCH];
    cc.tiltEventTypes = [{ eventType: Cesium.CameraEventType.PINCH, modifier: undefined }];
    cc.rotateEventTypes = [Cesium.CameraEventType.LEFT_DRAG];
  }

  try {
    const tileset = await Cesium.createGooglePhotorealistic3DTileset();
    if (IS_MOBILE) {
      tileset.maximumScreenSpaceError = 24;
      tileset.maximumMemoryUsage = 256;
    }
    viewer.scene.primitives.add(tileset);
  } catch(e) { console.warn('Google 3D tiles failed:', e); }

  // Camera
  const initCart = Cesium.Cartesian3.fromDegrees(sceneConfig.lon, sceneConfig.lat, 50);
  const initTx = Cesium.Transforms.eastNorthUpToFixedFrame(initCart);
  viewer.scene.camera.lookAtTransform(initTx,
    new Cesium.HeadingPitchRange(Cesium.Math.toRadians(-30), Cesium.Math.toRadians(-25), 200));
  viewer.scene.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);

  // State
  let ctCartesian = null, ctCartographic = null;
  let azimuthDeg = 0, skyview = null, heightAGL = 0;
  let lastEnuTx = null;

  function runRaytrace() {
    if (!ctCartesian) return;
    const gc = Cesium.Cartographic.fromCartesian(ctCartesian);
    const ctRaised = Cesium.Cartesian3.fromRadians(gc.longitude, gc.latitude, gc.height + heightAGL);
    const enuTx = Cesium.Transforms.eastNorthUpToFixedFrame(ctRaised);
    lastEnuTx = enuTx;

    const t0 = performance.now();
    skyview = computeSkyview(viewer, ctRaised, enuTx, PITCH_DEG, azimuthDeg);
    skyview._azDeg = azimuthDeg;
    const dt = performance.now() - t0;

    drawDomeOverlay(ovCtx, ovCanvas.width, ovCanvas.height, viewer, ctRaised, enuTx, skyview);
    drawPolarPlot(document.getElementById('polarCanvas'), skyview, azimuthDeg);
    updateHUD(dt);
  }

  // Camera-idle overlay + panel auto-hide
  let cameraIdleTimer = null;
  let panelIdleTimer = null;
  let lastCameraPos = new Cesium.Cartesian3();
  const IDLE_DELAY = IS_MOBILE ? 200 : 100;

  function drawPointMarker() {
    if (!ctCartesian) return;
    const gc = Cesium.Cartographic.fromCartesian(ctCartesian);
    const ctRaised = Cesium.Cartesian3.fromRadians(gc.longitude, gc.latitude, gc.height + heightAGL);
    const sp = Cesium.SceneTransforms.wgs84ToWindowCoordinates(viewer.scene, ctRaised);
    ovCtx.clearRect(0, 0, ovCanvas.width, ovCanvas.height);
    if (!sp) return;
    const x = sp.x * OV_DPR, y = sp.y * OV_DPR;
    ovCtx.beginPath(); ovCtx.arc(x, y, 6*OV_DPR, 0, Math.PI*2);
    ovCtx.fillStyle = 'cyan'; ovCtx.fill();
    ovCtx.strokeStyle = 'white'; ovCtx.lineWidth = 2; ovCtx.stroke();
  }

  function redrawOverlayNow() {
    if (!skyview || !ctCartesian || !lastEnuTx) return;
    const gc = Cesium.Cartographic.fromCartesian(ctCartesian);
    const ctRaised = Cesium.Cartesian3.fromRadians(gc.longitude, gc.latitude, gc.height + heightAGL);
    ovCanvas.style.opacity = '1';
    drawDomeOverlay(ovCtx, ovCanvas.width, ovCanvas.height, viewer, ctRaised, lastEnuTx, skyview);
  }

  viewer.scene.postRender.addEventListener(() => {
    if (!skyview || !ctCartesian) return;
    const camPos = viewer.scene.camera.positionWC;
    const moved = !Cesium.Cartesian3.equalsEpsilon(camPos, lastCameraPos, 0, 1e-6);
    Cesium.Cartesian3.clone(camPos, lastCameraPos);

    if (moved) {
      // Keep just the point marker visible during movement
      ovCanvas.style.opacity = '1';
      drawPointMarker();
      if (cameraIdleTimer) clearTimeout(cameraIdleTimer);
      cameraIdleTimer = setTimeout(redrawOverlayNow, IDLE_DELAY);

      // Auto-hide panel while navigating (unless user locked it)
      if (!panelLocked && hasPoint) {
        hidePanel();
        if (panelIdleTimer) clearTimeout(panelIdleTimer);
        panelIdleTimer = setTimeout(() => { if (hasPoint && !panelLocked) showPanel(); }, 500);
      }
    }
  });

  function updateHUD(ms) {
    const lat = Cesium.Math.toDegrees(ctCartographic.latitude);
    const lon = Cesium.Math.toDegrees(ctCartographic.longitude);
    const lines = [
      `<b>${lat.toFixed(4)}°N, ${Math.abs(lon).toFixed(4)}°W</b>`,
      `ΔHeight: <span class="y">${heightAGL}m</span> above surface`,
      `Pitch: <span class="y">${PITCH_DEG}°</span> | Azimuth: <span class="y">${azimuthDeg}°</span>`,
      `Beam: ${BEAM_HALF_ANGLE_DEG}° half-angle (min elev ${MIN_ELEV_DEG}°) | Dome: ${DOME_R}m`
    ];
    if (skyview) {
      const p = parseFloat(skyview.pct), cls = p>=90?'g':p>=70?'y':'r';
      lines.push(`Skyview: <span class="${cls}">${skyview.pct}% clear</span> (${skyview.clear}/${skyview.total} in beam)`);
      if (ms !== undefined) lines.push(`Raytrace: ${ms.toFixed(0)}ms`);
    }
    hud.innerHTML = lines.join('<br>');
  }

  // ============================================================
  // INPUT
  // ============================================================
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  function placePoint(pos) {
    const cart = viewer.scene.pickPosition(pos);
    if (!cart) return;
    ctCartesian = cart;
    ctCartographic = Cesium.Cartographic.fromCartesian(cart);

    // First point placed — show polar + panel
    if (!hasPoint) {
      hasPoint = true;
      panelLocked = false;
      showPolar();
    }
    showPanel();
    runRaytrace();
  }
  handler.setInputAction(function(click) { placePoint(click.position); }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

  // Long-press on mobile
  if (IS_MOBILE) {
    let lpTimer = null, lpPos = null;
    const cesiumCanvas = viewer.scene.canvas;
    cesiumCanvas.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      lpPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      lpTimer = setTimeout(() => {
        if (lpPos) placePoint(new Cesium.Cartesian2(lpPos.x, lpPos.y));
        lpTimer = null;
      }, 500);
    }, { passive: true });
    cesiumCanvas.addEventListener('touchmove', e => {
      if (!lpTimer || !lpPos) return;
      const dx = e.touches[0].clientX - lpPos.x, dy = e.touches[0].clientY - lpPos.y;
      if (dx*dx + dy*dy > 100) { clearTimeout(lpTimer); lpTimer = null; }
    }, { passive: true });
    cesiumCanvas.addEventListener('touchend', () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }, { passive: true });
    cesiumCanvas.addEventListener('touchcancel', () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }, { passive: true });
  }

  function resetCamera() {
    viewer.scene.camera.lookAtTransform(initTx,
      new Cesium.HeadingPitchRange(Cesium.Math.toRadians(-30),Cesium.Math.toRadians(-25),200));
    viewer.scene.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
  }

  window.addEventListener('keydown', e => {
    if (document.activeElement === document.getElementById('searchInput')) return;
    if (e.key==='r'||e.key==='R') resetCamera();
  });

  // Controls hint
  document.getElementById('controls').textContent = IS_MOBILE
    ? 'Long-press: place point | Pinch: zoom | Drag: orbit'
    : 'Right-click: place point | Scroll: zoom | Drag: orbit | R: reset';

  // Search
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('keydown', async e => {
    if (e.key !== 'Enter') return;
    const q = searchInput.value.trim(); if (!q) return;
    const parts = q.split(',').map(s=>s.trim());
    let flyLat, flyLon, label;
    if (parts.length===2 && !isNaN(+parts[0]) && !isNaN(+parts[1])) {
      flyLat=+parts[0]; flyLon=+parts[1]; label=`${flyLat.toFixed(4)}, ${flyLon.toFixed(4)}`;
    } else {
      searchInput.style.borderColor='#fc4';
      try {
        const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
        const d=await r.json();
        if(d.length>0){flyLat=+d[0].lat;flyLon=+d[0].lon;label=d[0].display_name.split(',').slice(0,3).join(',');}
        else{searchInput.style.borderColor='#f66';setTimeout(()=>searchInput.style.borderColor='#555',1500);return;}
      }catch(err){searchInput.style.borderColor='#f66';setTimeout(()=>searchInput.style.borderColor='#555',1500);return;}
    }
    if(flyLat!==undefined){
      searchInput.value=label||`${flyLat.toFixed(6)}, ${flyLon.toFixed(6)}`;
      searchInput.style.borderColor='#4c4';setTimeout(()=>searchInput.style.borderColor='#555',2000);
      searchInput.blur();
      viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(flyLon,flyLat,300),
        orientation:{heading:Cesium.Math.toRadians(-30),pitch:Cesium.Math.toRadians(-45),roll:0},duration:2});
    }
  });

  // Toolbar
  const slAz=document.getElementById('slAz'),numAz=document.getElementById('numAz');
  function setAzimuth(v){azimuthDeg=((Math.round(v)%360)+360)%360;slAz.value=Math.min(azimuthDeg,355);numAz.value=azimuthDeg;runRaytrace();}
  slAz.addEventListener('input',()=>setAzimuth(+slAz.value));
  numAz.addEventListener('change',()=>setAzimuth(+numAz.value));
  document.getElementById('btnAzMinus').addEventListener('click',()=>setAzimuth(azimuthDeg-10));
  document.getElementById('btnAzPlus').addEventListener('click',()=>setAzimuth(azimuthDeg+10));
  const slH=document.getElementById('slHeight'),numH=document.getElementById('numHeight');
  function setHeight(v){heightAGL=Math.max(0,Math.min(200,Math.round(v)));slH.value=Math.min(heightAGL,100);numH.value=heightAGL;runRaytrace();}
  slH.addEventListener('input',()=>setHeight(+slH.value));
  numH.addEventListener('change',()=>setHeight(+numH.value));
  document.getElementById('btnHMinus').addEventListener('click',()=>setHeight(heightAGL-1));
  document.getElementById('btnHPlus').addEventListener('click',()=>setHeight(heightAGL+1));

  // ============================================================
  // POLAR PLOT DRAG — swipe/drag to aim azimuth
  // ============================================================
  const polarCanvas = document.getElementById('polarCanvas');
  let polarDragging = false;

  function polarAzFromEvent(e) {
    const rect = polarCanvas.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dx = clientX - cx, dy = clientY - cy;
    // atan2(dx, -dy) → N=0, E=90, S=180, W=270
    let deg = Math.atan2(dx, -dy) * 180 / Math.PI;
    if (deg < 0) deg += 360;
    return Math.round(deg / 5) * 5; // snap to 5° increments
  }

  function onPolarStart(e) {
    if (!hasPoint) return;
    polarDragging = true;
    setAzimuth(polarAzFromEvent(e));
  }
  function onPolarMove(e) {
    if (!polarDragging) return;
    e.preventDefault();
    setAzimuth(polarAzFromEvent(e));
  }
  function onPolarEnd() { polarDragging = false; }

  // Touch events
  polarCanvas.addEventListener('touchstart', onPolarStart, { passive: true });
  polarCanvas.addEventListener('touchmove', onPolarMove, { passive: false });
  polarCanvas.addEventListener('touchend', onPolarEnd);
  polarCanvas.addEventListener('touchcancel', onPolarEnd);
  // Mouse events (desktop)
  polarCanvas.addEventListener('mousedown', onPolarStart);
  window.addEventListener('mousemove', onPolarMove);
  window.addEventListener('mouseup', onPolarEnd);

  // ============================================================
  // FULLSCREEN — request on first user interaction
  // ============================================================
  let fullscreenRequested = false;
  function requestFullscreen() {
    if (fullscreenRequested || document.fullscreenElement) return;
    fullscreenRequested = true;
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (rfs) rfs.call(el).catch(() => {});
  }
  // Trigger on first meaningful interaction
  document.addEventListener('click', requestFullscreen, { once: true });
  document.addEventListener('touchstart', requestFullscreen, { once: true });

  console.log('Skyview raytrace viewer ready');
}
main().catch(e=>{console.error(e);document.getElementById('hud').textContent='Error: '+e.message;});
</script>
</body>
</html>
